<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>colonyx.world</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
letter-spacing:2px;
opacity:0.9;
animation:pulse 2s infinite;
}

.footer{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
font-size:14px;
opacity:0.6;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:1;}
100%{opacity:0.3;}
}

</style>
</head>

<body>

<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="center">
under development
</div>

<div class="footer">
the colony is expanding
</div>

</body>
</html>
